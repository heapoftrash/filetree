# https://git-cliff.org/docs/configuration
# Changelog is generated from git history (conventional commits when possible).

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

This file is **generated** by [git-cliff](https://github.com/orhun/git-cliff) from the git history on each push to `main` (see `.github/workflows/changelog.yml`). Edit commit messages, not this file.

"""

[git]
# v0.0.1-beta, v0.0.3-beta, etc.
tag_pattern = "v[0-9].*"
# Prefer conventional subject lines; skip our automation commit
commit_parsers = [
  { message = "^chore: update changelog", skip = true },
  { message = "^Merge pull request", skip = true },
  { message = "^Merge branch", skip = true },
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore", group = "Maintenance" },
  { message = "^ci", group = "CI" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^test", group = "Tests" },
  { message = "^.*", group = "Other" },
]
filter_commits = false
sort_commits = "oldest"
