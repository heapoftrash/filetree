name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit message
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate commits (push)
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            npx commitlint --last --verbose
          else
            npx commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --verbose
          fi

      - name: Validate commits (pull request)
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  app:
    name: App (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: app/go.sum

      - name: Build
        run: |
          VERSION=$(tr -d '\n' < version.txt)
          COMMIT=$(git rev-parse --short HEAD)
          cd app && go build -ldflags "-X github.com/heapoftrash/filetree/app/version.Version=${VERSION} -X github.com/heapoftrash/filetree/app/version.Commit=${COMMIT}" -o filetree .

      - name: Vet
        run: cd app && go vet ./...

      - name: Test
        run: cd app && go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          working-directory: app

  gosec:
    name: Go security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: app/go.sum

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd app && gosec ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: cd app/web && npm ci

      - name: Build
        run: cd app/web && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: app/web/dist

  app-embed:
    name: App (embedded UI)
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: app/go.sum

      # Upload stores paths relative to app/web/dist (index.html, assets/...), not app/web/dist/...
      # Extract directly into app/web/dist so cp below finds the built UI.
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/web/dist

      - name: Stage UI for embed
        run: |
          rm -rf app/uiembed/dist
          mkdir -p app/uiembed/dist
          cp -R app/web/dist/. app/uiembed/dist/

      - name: Build with embedded frontend
        run: |
          VERSION=$(tr -d '\n' < version.txt)
          COMMIT=$(git rev-parse --short HEAD)
          cd app && go build -tags embed -ldflags "-X github.com/heapoftrash/filetree/app/version.Version=${VERSION} -X github.com/heapoftrash/filetree/app/version.Commit=${COMMIT}" -o filetree .

  docker-build:
    name: Build
    runs-on: ubuntu-latest
    needs: [commitlint, app, gosec, frontend, app-embed]
    steps:
      - uses: actions/checkout@v6

      - name: Short git commit for Docker ldflags
        id: git_commit
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: filetree:test
          build-args: |
            GIT_COMMIT=${{ steps.git_commit.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Push
    runs-on: ubuntu-latest
    needs: [docker-build, frontend]
    # Tags use .github/workflows/release.yml for GHCR multi-arch + binaries
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Short git commit for Docker ldflags
        id: git_commit
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
          flavor: |
            # GHCR `latest` is owned by .github/workflows/release.yml (multi-arch stable tags only)
            latest=false

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT=${{ steps.git_commit.outputs.short }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [commitlint, app, gosec, frontend, app-embed, docker-build]
    steps:
      - name: All checks passed
        run: echo "All checks passed"
