# Regenerate CHANGELOG.md from git history (git-cliff). Runs on pull requests
# (same-repo only): commits and pushes to the PR head branch. Fork PRs are skipped
# (token cannot push to forks). paths-ignore avoids loops when only CHANGELOG.md changes.
name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: changelog-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  regenerate:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Install git-cliff
        env:
          GC_VERSION: '2.10.1'
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/git-cliff.tgz \
            "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf /tmp/git-cliff.tgz -C /tmp
          sudo mv "/tmp/git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/
          git-cliff --version

      - name: Generate CHANGELOG.md
        run: git-cliff -o CHANGELOG.md

      - name: Commit and push
        env:
          BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes."
          else
            git commit -m "chore: update changelog"
            git push origin "HEAD:refs/heads/${BRANCH}"
          fi
