# Regenerate CHANGELOG.md from git history (git-cliff). Skips runs when the only
# changed files are CHANGELOG.md (avoids loops when the bot commits).
name: Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: changelog
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        env:
          GC_VERSION: '2.10.1'
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/git-cliff.tgz \
            "https://github.com/orhun/git-cliff/releases/download/v${GC_VERSION}/git-cliff-${GC_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf /tmp/git-cliff.tgz -C /tmp
          sudo mv "/tmp/git-cliff-${GC_VERSION}/git-cliff" /usr/local/bin/
          git-cliff --version

      - name: Generate CHANGELOG.md
        run: git-cliff -o CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes."
          else
            git commit -m "chore: update changelog"
            git push
          fi
