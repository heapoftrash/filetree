<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 320px;
          height: 320px;
          font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          letter-spacing: -1px;
        }
        .logo { position: relative; width: 45%; }
        .logo svg { position: relative; display: block; margin: 15%; z-index: 1; }
        .backdrop {
          position: absolute;
          width: 100%;
          height: 100%;
          background-image: linear-gradient(#5d6cc0, #5a5168, #888);
          border-radius: 100%;
          animation: backdrop infinite both 10s 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        h1 { margin: 20px 0 4px; color: #5d6cc0; font-weight: bold; font-size: 24px; }
        h2 { margin: 4px 0; color: #5a5168; font-size: 14px; }
      </style>
      <div class="container">
        <div class="logo">
          <div class="backdrop"></div>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
            <!-- Background boxes (stacked folders) - same as logo.svg -->
            <rect x="10" y="10" width="65" height="80" fill="rgba(255,255,255,0.15)" rx="4" stroke="rgba(255,255,255,0.35)" stroke-width="1">
              <animate attributeName="x" values="10;14;10" dur="4s" repeatCount="indefinite"/>
              <animate attributeName="y" values="10;14;10" dur="4s" repeatCount="indefinite"/>
            </rect>
            <rect x="20" y="20" width="65" height="80" fill="rgba(255,255,255,0.1)" rx="4" stroke="rgba(255,255,255,0.25)" stroke-width="1">
              <animate attributeName="x" values="20;24;20" dur="4s" begin="0.3s" repeatCount="indefinite"/>
              <animate attributeName="y" values="20;24;20" dur="4s" begin="0.3s" repeatCount="indefinite"/>
            </rect>
            <!-- Main file document - same as logo.svg -->
            <path d="M 30 30 H 80 L 95 45 V 110 H 30 Z" fill="#FFFFFF" stroke="rgba(255,255,255,0.5)" stroke-width="1" rx="4"/>
            <path d="M 80 30 V 45 H 95 L 80 30" fill="#ddd" stroke="#333" stroke-width="1" rx="2"/>
            <!-- Folder tree - same structure as logo.svg -->
            <g transform="translate(42, 55)">
              <rect x="-2" y="0" width="12" height="8" fill="#5d6cc0" rx="2"/>
              <path d="M 4 10 V 42" stroke="rgba(255,255,255,0.9)" stroke-width="3" fill="none" stroke-linecap="round"/>
              <line x1="4" y1="20" x2="20" y2="20" stroke="#333" stroke-width="3" stroke-linecap="round"/>
              <line x1="4" y1="31" x2="25" y2="31" stroke="#555" stroke-width="3" stroke-linecap="round"/>
              <line x1="4" y1="42" x2="30" y2="42" stroke="#888" stroke-width="3" stroke-linecap="round"/>
              <!-- File boxes - animate x to move them -->
              <rect x="35" y="15" width="12" height="8" fill="#333" rx="2">
                <animate attributeName="x" values="35;42;35" dur="2.5s" begin="0s" repeatCount="indefinite"/>
              </rect>
              <rect x="35" y="27" width="12" height="8" fill="#555" rx="2">
                <animate attributeName="x" values="35;42;35" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
              </rect>
              <rect x="35" y="38" width="12" height="8" fill="#888" rx="2">
                <animate attributeName="x" values="35;42;35" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
              </rect>
            </g>
          </svg>
        </div>
        <h1>Filetree</h1>
        <h2>Self-hosted file manager</h2>
      </div>
    </div>
  </foreignObject>
</svg>
