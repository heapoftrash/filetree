site_name: Filetree
site_description: Self-hosted web file manager — no database, simple YAML/JSON config. Browse, upload, preview, and manage files from your browser.
site_url: https://heapoftrash.github.io/filetree/

repo_url: https://github.com/heapoftrash/filetree
repo_name: heapoftrash/filetree
theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - toc.integrate
    - navigation.instant
    - navigation.instant.prefetch

nav:
  - Home: index.md
  - Features: features.md
  - Getting Started:
    - Installation: getting-started.md
  - Configuration: config.md
  - Authentication: auth.md
  - API Reference: API.md

markdown_extensions:
  - meta
  - md_in_html
  - attr_list
  - toc:
      permalink: true
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - admonition

extra_css:
  - assets/styles/home.css
  - assets/styles/page-meta.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/heapoftrash/filetree
      name: GitHub
  announce:
    title: Filetree is a work in progress.
    icon: material/rocket-launch
    link: https://github.com/heapoftrash/filetree

plugins:
  - search